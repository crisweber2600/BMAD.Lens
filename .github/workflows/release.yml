name: Build & Release BMAD.Lens

on:
  push:
    branches:
      - 'release/**'
      - 'release'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install BMAD with all official modules
        run: |
          mkdir -p release-build
          npx bmad-method@beta install \
            --directory "${{ github.workspace }}/release-build" \
            --modules bmm,bmb,cis,gds,tea \
            --tools cursor,github-copilot,claude-code \
            --user-name BMADRelease \
            --output-folder _bmad-output \
            --yes

      - name: Install custom modules (lens-work, file-transforms)
        run: |
          cp -r src/modules/lens-work release-build/_bmad/lens-work
          cp -r src/modules/file-transforms release-build/_bmad/file-transforms

      - name: Configure Codex IDE prompts
        run: |
          # Codex uses the same artifact format as Claude Code
          # but its installer requires interactive prompts.
          # Copy the Claude Code commands as Codex prompts.
          mkdir -p release-build/.codex/prompts
          cp -r release-build/.claude/commands/* release-build/.codex/prompts/

      - name: Generate version tag
        id: version
        run: |
          # Extract version from branch name (e.g., release/1.0.0 -> 1.0.0,
          # release-1.0.0 -> 1.0.0, release -> use short SHA)
          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION="${BRANCH#release}"
          VERSION="${VERSION#/}"
          VERSION="${VERSION#-}"
          if [ -z "$VERSION" ]; then
            VERSION="0.0.0-$(echo $GITHUB_SHA | cut -c1-7)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Create release zip
        run: |
          cd release-build
          zip -r "${{ github.workspace }}/bmad-lens-v${{ steps.version.outputs.version }}.zip" \
            _bmad/ \
            _bmad-output/ \
            .cursor/ \
            .github/ \
            .claude/ \
            .codex/ \
            docs/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: BMAD.Lens v${{ steps.version.outputs.version }}
          body: |
            ## BMAD.Lens Release v${{ steps.version.outputs.version }}

            Pre-built BMAD installation with the following modules and IDE configurations.

            ### Modules
            - **bmm** — BMad Method Master
            - **bmb** — BMad Builder
            - **cis** — Creative Intelligence Suite (ideation & design thinking)
            - **gds** — Game Dev Studio (game development workflows)
            - **tea** — Test Architect (test strategy & automation)
            - **lens-work** — LENS Workbench (guided lifecycle router)
            - **file-transforms** — Post-install file transform engine

            ### IDE Configurations
            - **Cursor** (`.cursor/commands/`)
            - **GitHub Copilot** (`.github/agents/`)
            - **Claude Code** (`.claude/commands/`)
            - **Codex** (`.codex/prompts/`)

            ### Installation
            1. Download and extract `bmad-lens-v${{ steps.version.outputs.version }}.zip` into your project root
            2. The `_bmad/`, `.cursor/`, `.github/`, `.claude/`, `.codex/`, and `_bmad-output/` directories will be created
            3. See [Non-Interactive Installation docs](https://docs.bmad-method.org/how-to/non-interactive-installation/) for more options
          files: bmad-lens-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
