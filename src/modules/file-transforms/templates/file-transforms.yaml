# ============================================================================
# BMAD File Transform Rules
# ============================================================================
# Purpose: Rename files whose extensions are blocked by org-level
#          GitHub Copilot content-exclusion rules.
#
# Applied AFTER every bmad / lens-work install or upgrade.
# Reversed BEFORE upgrades so the installer sees canonical names.
#
# The transform script:
#   1. Creates backup of _bmad directory
#   2. Renames files matching each rule (respecting exclusions)
#   3. Rewrites ALL internal references by type (CSV, JS, MD)
#   4. Validates file integrity
#   5. Cleans up backup after successful validation
#   6. Logs every action for auditability
#   7. Is idempotent - safe to run multiple times
# ============================================================================

version: 1

# Directories to process (relative to project root)
scope:
  - _bmad
  - _bmad-output

# File types that contain references and need rewriting
rewritable_extensions:
  - .md
  - .yaml
  - .json
  - .csv
  - .js
  - .xml
  - .ps1
  - .sh
  - .bat

# ============================================================================
# Exclusions - Files that should NOT be renamed
# ============================================================================
exclusions:
  description: "Files that should NOT be renamed - external references or GitHub Actions"
  
  # Exact paths (relative to project root) that must keep original names
  paths:
    - "_bmad-output/lens-work/state.yaml"    # Runtime state file, keep as YAML for readability
    - "_bmad-output/lens-work/event-log.jsonl" # Event log, already non-YAML

  # Glob patterns for files whose REFERENCES to external paths should not trigger renames
  # These files may themselves be renamed, but external refs inside them stay untouched
  reference_only:
    - "_bmad/tea/testarch/knowledge/*.md"     # Contains .github/workflows/*.yml refs (external CI/CD)

  # External filename patterns - never rename when found inside reference text
  # These are build/test artifacts not part of BMAD module system
  external_patterns:
    - "pom.xml"        # Maven build files
    - "build.gradle"   # Gradle build files
    - "results.xml"    # Test output files

# ============================================================================
# Execution Order
# ============================================================================
execution_order:
  - "Backup: Create backup of _bmad directory"
  - "Phase 1: Rename all YAML files to JSON"
  - "Phase 2: Convert all XML files to MD (requires content transformation)"
  - "Phase 3: Update all references in CSV manifests"
  - "Phase 4: Update all references in JS files"
  - "Phase 5: Update all references in MD files"
  - "Validation: Run file integrity check"
  - "Cleanup: Remove backup after successful validation"

# ============================================================================
# Transform Rules
# ============================================================================
# Rules are applied in order. More-specific rules override general ones.
#
# Types:
#   extension  - change every file with old_ext to new_ext
#   rename     - change a specific filename (basename) everywhere it appears
# ============================================================================

transforms:

  # -- Specific filename renames (applied FIRST) ----------------------------
  - type: rename
    description: "config.yaml to bmad-config.json (all modules)"
    old_name: "config.yaml"
    new_name: "bmad-config.json"

  # -- General extension transforms ----------------------------------------
  - type: extension
    description: "All remaining .yaml to .json"
    old_ext: ".yaml"
    new_ext: ".json"

  - type: extension
    description: "All .yml to .json"
    old_ext: ".yml"
    new_ext: ".json"

  - type: extension
    description: "All .xml to .md"
    old_ext: ".xml"
    new_ext: ".md"
    collision_prefix: "x-"
